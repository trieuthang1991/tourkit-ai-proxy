# nginx site cho Vbee gateway — /etc/nginx/sites-available/vbee-gateway
# Sau khi copy: ln -s ../sites-available/vbee-gateway /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
#
# ĐỔI vbee-gw.tourkit.vn thành domain THẬT của bạn (trỏ A record về IP con Ubuntu này).
# Cert: chạy certbot (xem README) — nó tự chèn ssl_certificate. Khối dưới đã để sẵn 2 dòng cert
# theo đường dẫn Let's Encrypt chuẩn; nếu dùng certbot --nginx thì certbot tự sửa, khỏi đụng tay.

# HTTP :80 — cho certbot verify + redirect sang HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name vbee-gw.tourkit.vn;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS :443 — TLS termination, cipher tương thích Windows Server 2012 R2, proxy về Node local
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vbee-gw.tourkit.vn;

    ssl_certificate     /etc/letsencrypt/live/vbee-gw.tourkit.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vbee-gw.tourkit.vn/privkey.pem;

    # ── QUAN TRỌNG: bật TLS 1.2 + cipher CŨ để Schannel của Windows 2012 R2 bắt tay được ──
    # 2012 R2 chỉ có ECDHE P-256/P-384 + RSA, KHÔNG có x25519/TLS1.3 → phải mở các cipher này.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve prime256v1:secp384r1;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-SHA256:AES128-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 1h;

    client_max_body_size 64k;          # chỉ nhận {text} nhỏ

    location = /vbee/tts {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Api-Key $http_x_api_key;   # chuyển tiếp header auth
        proxy_read_timeout 90s;        # Vbee poll có thể tới ~45s → để dư
        proxy_send_timeout 90s;
        proxy_buffering off;           # trả mp3 ngay khi có
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8090;
    }

    location / { return 404; }
}
