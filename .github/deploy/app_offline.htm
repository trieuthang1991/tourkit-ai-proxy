<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đang cập nhật hệ thống</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0f172a;color:#e2e8f0}
    .box{text-align:center;padding:32px;max-width:420px}
    .dot{width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;
      animation:p 1s infinite alternate}
    @keyframes p{to{opacity:.3}}
    h1{font-size:20px;margin:16px 0 8px}
    p{color:#94a3b8;font-size:14px;line-height:1.6}
  </style>
</head>
<body>
  <div class="box">
    <span class="dot"></span>
    <h1>Hệ thống đang được cập nhật</h1>
    <p>Chúng tôi đang triển khai phiên bản mới. Vui lòng quay lại sau ít phút.</p>
  </div>
</body>
</html>
