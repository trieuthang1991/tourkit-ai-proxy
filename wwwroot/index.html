<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />

<base href="/" />
<title>TRAV-AI · Tour Operation & Quotation</title>
<!-- Favicon — SVG modern browsers; data: PNG fallback cho cache nguội / browser legacy không hiểu SVG -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<!-- Boot splash: HTML+CSS thuần inline → render NGAY khi parse HTML, không phụ thuộc styles.css/Babel.
     Tránh màn trắng lúc Ctrl+F5 (40+ file .jsx + Babel transform mất 2-4s).
     app.jsx (App useEffect đầu) thêm class 'bs-out' để fade ẩn, rồi remove element. -->
<style>
  #boot-splash {
    position: fixed; inset: 0; z-index: 999999;
    background: radial-gradient(circle at 30% 20%, #FFF7ED 0%, #FFE4CF 45%, #FED7AA 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Be Vietnam Pro', system-ui, -apple-system, 'Segoe UI', sans-serif;
    transition: opacity 360ms ease, visibility 360ms;
  }
  #boot-splash.bs-out { opacity: 0; visibility: hidden; pointer-events: none; }
  .bs-card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .bs-mascot {
    width: 180px; height: 180px;
    display: grid; place-items: center;
    animation: bs-float 2.6s ease-in-out infinite;
    filter: drop-shadow(0 18px 22px rgba(249,115,22,0.32));
  }
  .bs-mascot img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes bs-float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-14px) rotate(2deg); }
  }
  .bs-brand {
    font-size: 26px; font-weight: 800; letter-spacing: 0.5px;
    color: #9A3412; text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }
  .bs-status { font-size: 14px; font-weight: 500; color: #7C2D12; letter-spacing: 0.2px; }
  .bs-dots::after {
    content: ''; display: inline-block; width: 1.2em; text-align: left;
    animation: bs-dots 1.2s steps(4, end) infinite;
  }
  @keyframes bs-dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  .bs-bar {
    width: 220px; height: 3px; overflow: hidden;
    background: rgba(124,45,18,0.12); border-radius: 999px;
  }
  .bs-bar span {
    display: block; height: 100%; width: 40%;
    background: linear-gradient(90deg, transparent, #F97316, transparent);
    animation: bs-bar 1.4s ease-in-out infinite;
  }
  @keyframes bs-bar {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-splash" aria-hidden="true">
  <div class="bs-card">
    <div class="bs-mascot">
      <img src="/lib/masco-ai.png" alt="" onerror="this.style.display='none'" />
    </div>
    <div class="bs-brand">TRAV-AI</div>
    <div class="bs-status">Đang khởi tạo<span class="bs-dots"></span></div>
    <div class="bs-bar"><span></span></div>
  </div>
</div>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0F172A"/>

  <path d="M30 70 L50 60 L70 70" stroke="#F97316" stroke-width="2" fill="none"/>
</svg>
