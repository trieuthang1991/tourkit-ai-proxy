<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Tour Operation & Quotation · Tourkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0F172A"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#F97316" stroke-width="3"/>
  <path d="M50 35 L50 50 L62 56" stroke="#F97316" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M30 70 L50 60 L70 70" stroke="#F97316" stroke-width="2" fill="none"/>
</svg>
</template>

<!-- React + Babel standalone (no build step) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Chart.js (UMD, no build step) — professional charts cho trang Trợ lý số liệu -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

<!-- TinyMCE self-hosted LOCAL (GPL, không CDN) — HTML editor cho soạn mail. File ở wwwroot/lib/tinymce/ -->
<script src="lib/tinymce/tinymce.min.js" referrerpolicy="origin"></script>

<!-- /lib — third-party-style libs (data, icons) -->
<script src="lib/data.js"></script>
<script type="text/babel" src="lib/icons.jsx"></script>

<!-- /core — cross-cutting concerns: router, storage, parsers, AI client -->
<script type="text/babel" src="core/router.jsx"></script>
<script type="text/babel" src="core/storage.js"></script>
<script type="text/babel" src="core/parsers.js"></script>
<script type="text/babel" src="core/ai-provider.jsx"></script>
<script type="text/babel" src="core/auth.jsx"></script>

<!-- /components — reusable UI -->
<script type="text/babel" src="components/tweaks-panel.jsx"></script>
<script type="text/babel" src="components/dialogs.jsx"></script>
<script type="text/babel" src="components/customer-review-card.jsx"></script>

<!-- /steps — sub-views inside the wizard page -->
<script type="text/babel" src="steps/step1.jsx"></script>
<script type="text/babel" src="steps/step2.jsx"></script>
<script type="text/babel" src="steps/step3.jsx"></script>
<script type="text/babel" src="steps/step4.jsx"></script>

<!-- /pages — top-level pages. Add a new page = drop a file here + 1 Route in app.jsx -->
<script type="text/babel" src="pages/wizard.jsx"></script>
<script type="text/babel" src="pages/customers.jsx"></script>
<script type="text/babel" src="pages/assistant.jsx"></script>
<script type="text/babel" src="pages/mail.jsx"></script>
<script type="text/babel" src="pages/visa.jsx"></script>
<script type="text/babel" src="pages/deals.jsx"></script>
<script type="text/babel" src="pages/tour-builder.jsx"></script>

<!-- Root: App shell + router -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
